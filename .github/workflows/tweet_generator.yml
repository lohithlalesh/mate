name: Simplify Suite — Tweet Generator

on:
  # Runs automatically every 4 hours
  schedule:
    - cron: "0 */4 * * *"

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the updated XLSX back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tweet generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_tweets.py

      - name: Commit updated tweet queue
        run: |
          git config --local user.email "tweetbot@simplifysuite.io"
          git config --local user.name "Simplify Tweet Bot"
          git add tweets_queue.xlsx
          git diff --staged --quiet || git commit -m "🐦 Add tweets — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
