  name: tweet-generator                                                                                                                               
                                          
  on:                                                                                                                                                 
    schedule:                                                                                                                                         
      - cron: 0 */4 * * *                                                                                                                             
    workflow_dispatch:                                                                                                                                
                                                                                                                                                      
  permissions:                                                                                                                                        
    contents: write                                                                                                                                   

  jobs:
    generate:
      runs-on: ubuntu-latest
      steps:                                  
        - uses: actions/checkout@v4       
          with:
            token: ${{ secrets.GITHUB_TOKEN }}                                                                                                        
        - uses: actions/setup-python@v5
          with:                                                                                                                                       
            python-version: 3.11                            
        - run: pip install -r requirements.txt
        - run: python generate_tweets.py
          env:                                                                                                                                        
            GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        - run: |                                                                                                                                      
            git config --local user.email "bot@simplifysuite.io"
            git config --local user.name "Tweet Bot"
            if [ -f tweets_queue.xlsx ]; then                                                                                                         
              git add tweets_queue.xlsx       
              git diff --staged --quiet || git commit -m "Add tweets"                                                                                 
              git push                                      
            fi  
